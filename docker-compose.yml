version: '3'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - DB_HOST=db
      - DB_DATABASE=media_hub
      - DB_USERNAME=root
      - DB_PASSWORD=secret_password
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=media_hub
      - MYSQL_ROOT_PASSWORD=secret_password
    ports:
      - "3306:3306"

