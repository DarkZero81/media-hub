version: '3'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - DB_HOST=db
      - DB_DATABASE=media_hub
      - DB_USERNAME=root
      - DB_PASSWORD=secret_password
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=media_hub
      - MYSQL_ROOT_PASSWORD=secret_password
    ports:
      - "3306:3306"

  # هذا القسم السحري الجديد يقوم بتشغيل الجداول والصور في الخلفية بأمان تنيفيذي تام
  migration_runner:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DB_HOST=db
      - DB_DATABASE=media_hub
      - DB_USERNAME=root
      - DB_PASSWORD=secret_password
    command: sh -c "sleep 10 && php artisan migrate:fresh --seed --force"
    depends_on:
      - db
